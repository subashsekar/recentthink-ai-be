name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: recentthink
          POSTGRES_PASSWORD: recentthink
          POSTGRES_DB: recentthink
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recentthink -d recentthink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgresql+psycopg://recentthink:recentthink@localhost:5432/recentthink

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: isort (check)
        run: uv run isort --check-only .

      - name: Black (check)
        run: uv run black --check .

      - name: mypy (shared + tests)
        run: uv run mypy shared tests

      - name: mypy (each service)
        run: |
          for svc in gateway auth_service user_service admin_service ai_service usage_service; do
            echo "==> mypy services/$svc/app"
            ( cd "services/$svc" && MYPYPATH=. uv run mypy --explicit-package-bases app ) || exit 1
          done

      - name: Alembic (migration smoke test)
        # Exercise the full upgrade/downgrade cycle so every revision's
        # downgrade() is verified, then leave the schema at head for the tests.
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Pytest (with coverage)
        run: uv run pytest
