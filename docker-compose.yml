# Full local stack for RecentThink: PostgreSQL + all six microservices.
# All services are built from the single reusable root Dockerfile, selecting
# the target via SERVICE_NAME / SERVICE_PORT build args, and share a private
# network so they can reach PostgreSQL and each other by service name.

name: recentthink

x-service-base: &service-base
  restart: unless-stopped
  networks:
    - recentthink
  depends_on:
    postgres:
      condition: service_healthy
  environment: &service-env
    ENVIRONMENT: ${ENVIRONMENT:-local}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    DATABASE_URL: postgresql+psycopg://recentthink:recentthink@postgres:5432/recentthink
    SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

services:
  postgres:
    image: postgres:16-alpine
    container_name: recentthink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: recentthink
      POSTGRES_PASSWORD: recentthink
      POSTGRES_DB: recentthink
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - recentthink
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recentthink -d recentthink"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    <<: *service-base
    container_name: recentthink-gateway
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth_service:
        condition: service_started
      user_service:
        condition: service_started
      admin_service:
        condition: service_started
      ai_service:
        condition: service_started
      usage_service:
        condition: service_started

  auth_service:
    <<: *service-base
    container_name: recentthink-auth
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth_service
        SERVICE_PORT: "8001"
    ports:
      - "8001:8001"

  user_service:
    <<: *service-base
    container_name: recentthink-user
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user_service
        SERVICE_PORT: "8002"
    ports:
      - "8002:8002"

  admin_service:
    <<: *service-base
    container_name: recentthink-admin
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin_service
        SERVICE_PORT: "8003"
    ports:
      - "8003:8003"

  ai_service:
    <<: *service-base
    container_name: recentthink-ai
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ai_service
        SERVICE_PORT: "8004"
    ports:
      - "8004:8004"
    environment:
      <<: *service-env
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      AVAILABLE_MODELS: ${AVAILABLE_MODELS:-google/gemini-2.5-flash,deepseek/deepseek-chat,meta-llama/llama-3.3-70b-instruct,openai/gpt-4o,nvidia/llama-3.1-nemotron-ultra-253b-v1}
      USAGE_SERVICE_URL: http://usage_service:8005

  usage_service:
    <<: *service-base
    container_name: recentthink-usage
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: usage_service
        SERVICE_PORT: "8005"
    ports:
      - "8005:8005"

networks:
  recentthink:
    name: recentthink-network
    driver: bridge

volumes:
  postgres_data:
    name: recentthink-postgres-data
