# Full local stack: PostgreSQL + six microservices.
# Each service has its own Dockerfile under services/<name>/Dockerfile.
# Build context is always the repo root (shared + pyproject.toml + uv.lock).

name: recentthink

x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-local}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: postgresql+psycopg://recentthink:recentthink@postgres:5432/recentthink
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}
  CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
  STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-storage}
  STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://localhost:8002/media}
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-recenthink_user_profile_picture}

x-service-base: &service-base
  restart: unless-stopped
  networks:
    - recentthink
  env_file:
    - .env
  environment:
    <<: *common-env
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: recentthink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: recentthink
      POSTGRES_PASSWORD: recentthink
      POSTGRES_DB: recentthink
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - recentthink
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recentthink -d recentthink"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    <<: *service-base
    container_name: recentthink-auth
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    ports:
      - "8001:8001"

  user_service:
    <<: *service-base
    container_name: recentthink-user
    build:
      context: .
      dockerfile: services/user_service/Dockerfile
    ports:
      - "8002:8002"

  admin_service:
    <<: *service-base
    container_name: recentthink-admin
    build:
      context: .
      dockerfile: services/admin_service/Dockerfile
    ports:
      - "8003:8003"

  ai_service:
    <<: *service-base
    container_name: recentthink-ai
    build:
      context: .
      dockerfile: services/ai_service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      AVAILABLE_MODELS: ${AVAILABLE_MODELS:-google/gemini-2.5-flash,deepseek/deepseek-chat,meta-llama/llama-3.3-70b-instruct,openai/gpt-4o,nvidia/llama-3.1-nemotron-ultra-253b-v1}
      USAGE_SERVICE_URL: http://usage_service:8005
      AUTH_SERVICE_URL: http://auth_service:8001

  usage_service:
    <<: *service-base
    container_name: recentthink-usage
    build:
      context: .
      dockerfile: services/usage_service/Dockerfile
    ports:
      - "8005:8005"

  gateway:
    <<: *service-base
    container_name: recentthink-gateway
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth_service:8001
      USER_SERVICE_URL: http://user_service:8002
      ADMIN_SERVICE_URL: http://admin_service:8003
      AI_SERVICE_URL: http://ai_service:8004
      USAGE_SERVICE_URL: http://usage_service:8005
    depends_on:
      postgres:
        condition: service_healthy
      auth_service:
        condition: service_started
      user_service:
        condition: service_started
      admin_service:
        condition: service_started
      ai_service:
        condition: service_started
      usage_service:
        condition: service_started

networks:
  recentthink:
    name: recentthink-network
    driver: bridge

volumes:
  postgres_data:
    name: recentthink-postgres-data
