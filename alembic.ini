# =============================================================================
# alembic.ini — Alembic CLI configuration (read by `alembic` commands).
#
# This file lives at the repo root and tells Alembic where migration scripts
# live and how logging behaves. The database URL here is a placeholder;
# migrations/env.py overrides it with DATABASE_URL from application settings.
# =============================================================================

[alembic]
# Path to the migrations package (contains env.py, script.py.mako, versions/).
script_location = migrations
# Add repo root to sys.path so `shared` and service packages import correctly.
prepend_sys_path = .
version_path_separator = os

# Placeholder only — env.py reads the real URL from shared.config.Settings.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
